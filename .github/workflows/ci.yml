name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m compileall src tests scripts
      - name: Install test dependencies
        run: pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest
